<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar-17</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <nav>
        <div class="menu">
            <input type="checkbox" id="check">
            <div class="logo"><a href="#">MyLogo</a></div>
            <ul>
                <label for="check" class="btn cancel">
                    <i class="fa-solid fa-xmark"></i>
                </label>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">Feedback</a></li>
            </ul>
            <label for="check" class="btn bars">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>
    </nav>
    <div class="center">
        <div class="upper">Responsive Nerumorphism Navigation Bar</div>
    </div>
    <div class="lower">Using HTML and CSS Only</div>
</body>
</html>
